<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okan Admin | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Okan Admin</h1>
            <p>Portal de Gestão de Academias</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="admin@okan.com">
                </div>
                
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" id="login-btn">Entrar no Painel</button>
                
                <div class="divider">ou</div>
                <button type="button" id="google-login-btn" class="btn-google">
                    Entrar com o Google
                </button>
            </form>
            <p id="error-message" class="error"></p>
        </div>
    </div>

    <script type="module" src="script/script.js"></script>
</body>
</html>
